<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fff7ec" />
  <title>预警出险高保真原型</title>
  <style>
    :root {
      color-scheme: light;
      --font-sans: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      --font-size-page-title: 22px;
      --font-size-section: 17px;
      --font-size-card-title: 16px;
      --font-size-body: 14px;
      --font-size-secondary: 13px;
      --font-size-caption: 12px;
      --font-size-label: 11px;
      --line-page-title: 28px;
      --line-section: 24px;
      --line-card-title: 22px;
      --line-body: 21px;
      --line-secondary: 19px;
      --line-caption: 17px;

      --color-bg: #fff7ec;
      --color-bg-soft: #fdf7ef;
      --color-surface: #ffffff;
      --color-surface-warm: #fffcf7;
      --color-surface-muted: #fff8f0;
      --color-text: #1f1b16;
      --color-text-soft: #7a7168;
      --color-text-muted: #9a8f84;
      --color-border: #f3e3d1;
      --color-divider: rgba(226, 203, 177, .68);
      --color-orange: #ff6a00;
      --color-orange-strong: #f97316;
      --color-orange-soft: #ffe8d2;
      --color-orange-softer: #fff0de;
      --color-success: #719a4a;
      --color-success-soft: #edf5df;
      --color-warning: #d58a16;
      --color-warning-soft: #fff0c9;
      --color-danger: #e85c23;
      --color-danger-soft: #ffe5d7;
      --color-default: #c94631;
      --color-default-soft: #fbe5df;
      --color-major: #c6481d;
      --color-major-soft: #ffe5d7;
      --color-level2: #b75400;
      --color-level2-soft: #ffe8d2;
      --color-level1: #8c6200;
      --color-level1-soft: #fff0c9;
      --color-overlay: rgba(44, 35, 28, .34);
      --color-focus: #ff7a1a;

      --space-1: 4px;
      --space-2: 6px;
      --space-3: 8px;
      --space-4: 10px;
      --space-5: 12px;
      --space-6: 14px;
      --space-7: 16px;
      --space-8: 20px;
      --space-9: 24px;
      --space-10: 32px;

      --radius-sm: 12px;
      --radius-md: 18px;
      --radius-lg: 22px;
      --radius-xl: 28px;
      --radius-pill: 999px;
      --radius-sheet: 26px;

      --shadow-card: 0 12px 30px rgba(116, 72, 26, .08);
      --shadow-soft: 0 18px 48px rgba(150, 92, 34, .12);
      --shadow-float: 0 20px 54px rgba(73, 45, 16, .18);

      --page-max: 430px;
      --page-padding: 16px;
      --header-height: 60px;
      --touch-target: 44px;
      --button-height: 48px;
      --bottom-ask-height: 60px;
      --bottom-reserve: 104px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: #f4ede3; }
    body {
      min-width: 320px;
      min-height: 100%;
      margin: 0;
      color: var(--color-text);
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 191, 122, .24), transparent 35%),
        linear-gradient(115deg, #fffaf1 0%, #f7efe6 50%, #fff6e9 100%);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum" 1;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .48; }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3, p { margin: 0; }
    [hidden] { display: none !important; }
    :focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 2px;
    }

    .app-shell {
      position: relative;
      width: min(100%, var(--page-max));
      height: 100dvh;
      min-height: 100dvh;
      margin: 0 auto;
      overflow-x: hidden;
      overflow-y: auto;
      scrollbar-width: none;
      background:
        radial-gradient(circle at 76% 6%, rgba(255, 190, 119, .14), transparent 23%),
        linear-gradient(180deg, #fff9f0 0%, #fff5e8 58%, #fdf8f0 100%);
      box-shadow: 0 0 0 1px rgba(243, 227, 209, .76), 0 30px 80px rgba(94, 66, 39, .10);
      -webkit-overflow-scrolling: touch;
    }
    .app-shell::-webkit-scrollbar { display: none; }

    .page {
      min-height: 100dvh;
      padding: 0 var(--page-padding) calc(var(--bottom-reserve) + var(--safe-bottom));
    }
    .page.no-ask { padding-bottom: calc(28px + var(--safe-bottom)); }
    .page-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-7);
      padding-top: var(--space-2);
    }

    .page-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: var(--touch-target) minmax(0, 1fr) var(--touch-target);
      align-items: center;
      min-height: var(--header-height);
      margin: 0 calc(var(--page-padding) * -1);
      padding: 8px var(--page-padding) 6px;
      background: linear-gradient(180deg, rgba(255, 248, 238, .98) 72%, rgba(255, 248, 238, 0));
    }
    .page-header h1 {
      overflow: hidden;
      margin: 0;
      font-size: var(--font-size-page-title);
      font-weight: 700;
      line-height: var(--line-page-title);
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--touch-target);
      height: var(--touch-target);
      min-width: var(--touch-target);
      border: 1px solid rgba(243, 227, 209, .92);
      border-radius: var(--radius-pill);
      color: #6b5542;
      background: rgba(255, 252, 247, .82);
      box-shadow: 0 8px 20px rgba(116, 72, 26, .07);
      font-size: 24px;
      line-height: 1;
    }
    .icon-button.icon-small { font-size: 18px; }
    .icon-button.is-plain { border-color: transparent; background: transparent; box-shadow: none; }

    .credit-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      min-height: 48px;
      border-bottom: 1px solid rgba(243, 227, 209, .9);
    }
    .credit-tabs button {
      position: relative;
      min-width: 0;
      border: 0;
      color: var(--color-text-muted);
      background: transparent;
      font-size: 15px;
      font-weight: 650;
      line-height: 22px;
      white-space: nowrap;
    }
    .credit-tabs button.is-active { color: var(--color-orange); }
    .credit-tabs button.is-active::after {
      position: absolute;
      right: calc(50% - 18px);
      bottom: -1px;
      width: 36px;
      height: 3px;
      border-radius: var(--radius-pill);
      background: var(--color-orange);
      content: "";
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-5);
      min-width: 0;
    }
    .section-heading h2 {
      min-width: 0;
      color: var(--color-text);
      font-size: var(--font-size-section);
      font-weight: 700;
      line-height: var(--line-section);
    }
    .section-heading .section-action {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      min-height: 32px;
      border: 0;
      padding: 0;
      color: var(--color-text-soft);
      background: transparent;
      font-size: var(--font-size-secondary);
      font-weight: 650;
      white-space: nowrap;
    }

    .card {
      border: 1px solid rgba(243, 227, 209, .92);
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 247, .94);
      box-shadow: var(--shadow-card);
    }
    .card-pad { padding: var(--space-7); }
    .card-pad-compact { padding: var(--space-6); }
    .hero-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      padding: var(--space-7);
      background:
        radial-gradient(circle at 88% 6%, rgba(255, 173, 93, .18), transparent 36%),
        rgba(255, 252, 247, .95);
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(243, 227, 209, .92);
    }
    .hero-card::after {
      position: absolute;
      right: -46px;
      bottom: -54px;
      width: 154px;
      height: 154px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 174, 94, .13), transparent 68%);
      content: "";
      pointer-events: none;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-4);
    }
    .metric-card {
      display: flex;
      min-width: 0;
      min-height: 126px;
      flex-direction: column;
      justify-content: space-between;
      padding: var(--space-7);
      text-align: left;
    }
    .metric-card .metric-label {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--color-text-soft);
      font-size: var(--font-size-secondary);
      font-weight: 650;
      line-height: var(--line-secondary);
    }
    .metric-card .metric-value {
      display: flex;
      align-items: baseline;
      gap: var(--space-1);
      margin-top: var(--space-5);
      color: var(--color-orange);
      white-space: nowrap;
    }
    .metric-card .metric-value strong {
      font-size: 30px;
      font-weight: 700;
      line-height: 32px;
    }
    .metric-card .metric-value span {
      font-size: 14px;
      font-weight: 650;
    }
    .metric-card .metric-meta {
      margin-top: var(--space-2);
      color: var(--color-text-soft);
      font-size: var(--font-size-secondary);
      line-height: var(--line-secondary);
    }
    .metric-card.tone-major .metric-value { color: var(--color-major); }
    .metric-card.tone-default .metric-value { color: var(--color-default); }
    .metric-card.tone-neutral .metric-value { color: var(--color-orange); }

    .data-scope-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      color: var(--color-text-muted);
      font-size: var(--font-size-caption);
      line-height: var(--line-caption);
    }
    .data-scope-row button {
      border: 0;
      padding: 0;
      color: var(--color-text-soft);
      background: transparent;
      font-weight: 650;
    }

    .grade-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
    }
    .grade-card {
      min-width: 0;
      min-height: 108px;
      border: 1px solid rgba(243, 227, 209, .92);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      background: rgba(255, 252, 247, .94);
      box-shadow: 0 9px 24px rgba(116, 72, 26, .06);
      text-align: left;
    }
    .grade-card .grade-label {
      overflow: hidden;
      color: var(--color-text-soft);
      font-size: 12px;
      font-weight: 650;
      line-height: 17px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .grade-card .grade-value {
      margin-top: var(--space-4);
      font-size: 22px;
      font-weight: 700;
      line-height: 25px;
      white-space: nowrap;
    }
    .grade-card .grade-change {
      margin-top: var(--space-2);
      font-size: 12px;
      font-weight: 650;
      line-height: 17px;
      white-space: nowrap;
    }
    .grade-card.major .grade-value { color: var(--color-major); }
    .grade-card.level2 .grade-value { color: var(--color-orange); }
    .grade-card.level1 .grade-value { color: var(--color-warning); }
    .trend-down { color: var(--color-success); }
    .trend-up { color: var(--color-danger); }
    .trend-stable { color: var(--color-text-muted); }

    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(58px, auto));
      gap: 2px;
      min-height: 40px;
      border: 1px solid rgba(243, 227, 209, .92);
      border-radius: var(--radius-pill);
      padding: 3px;
      background: rgba(255, 252, 247, .84);
    }
    .segmented button {
      min-height: 32px;
      border: 0;
      border-radius: var(--radius-pill);
      padding: 0 15px;
      color: var(--color-text-soft);
      background: transparent;
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
    }
    .segmented button.is-active {
      color: #fff;
      background: linear-gradient(135deg, var(--color-orange), #ff9542);
      box-shadow: 0 7px 16px rgba(255, 106, 0, .20);
    }

    .structure-card { padding: var(--space-7); }
    .structure-bar {
      display: flex;
      overflow: hidden;
      width: 100%;
      height: 12px;
      margin-top: var(--space-6);
      border-radius: var(--radius-pill);
      background: #f5eadb;
    }
    .structure-bar span { min-width: 6px; height: 100%; }
    .structure-bar .major { background: var(--color-major); }
    .structure-bar .level2 { background: var(--color-orange); }
    .structure-bar .level1 { background: var(--color-warning); }
    .structure-legend {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
      margin-top: var(--space-5);
    }
    .structure-legend div {
      min-width: 0;
      text-align: center;
    }
    .structure-legend span {
      display: block;
      color: var(--color-text-soft);
      font-size: 12px;
      line-height: 17px;
    }
    .structure-legend strong {
      display: block;
      margin-top: var(--space-1);
      font-size: 16px;
      line-height: 22px;
      white-space: nowrap;
    }
    .structure-legend em {
      display: block;
      margin-top: 2px;
      color: var(--color-text-soft);
      font-size: 11px;
      font-style: normal;
      line-height: 16px;
      white-space: nowrap;
    }

    .risk-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .risk-list-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--space-5);
      min-height: 100px;
      padding: var(--space-6);
      border: 1px solid rgba(243, 227, 209, .92);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 247, .94);
      box-shadow: 0 9px 24px rgba(116, 72, 26, .06);
      text-align: left;
    }
    .risk-list-item.is-clickable { cursor: pointer; }
    .risk-list-item.is-hidden { display: none; }
    .risk-list-main { min-width: 0; }
    .risk-list-name {
      display: -webkit-box;
      overflow: hidden;
      color: var(--color-text);
      font-size: 15px;
      font-weight: 700;
      line-height: 21px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .risk-list-group {
      overflow: hidden;
      margin-top: var(--space-1);
      color: var(--color-text-muted);
      font-size: 12px;
      line-height: 17px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .risk-list-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-top: var(--space-3);
    }
    .risk-list-date {
      margin-top: var(--space-3);
      color: var(--color-text-muted);
      font-size: 11px;
      line-height: 16px;
      white-space: nowrap;
    }
    .risk-list-amount {
      align-self: center;
      color: var(--color-orange);
      text-align: right;
      white-space: nowrap;
    }
    .risk-list-amount strong {
      display: block;
      font-size: 19px;
      font-weight: 700;
      line-height: 23px;
    }
    .risk-list-amount span {
      font-size: 12px;
      font-weight: 650;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      border: 1px solid transparent;
      border-radius: var(--radius-pill);
      padding: 0 9px;
      font-size: 11px;
      font-weight: 700;
      line-height: 16px;
      white-space: nowrap;
    }
    .tag-major { color: var(--color-major); background: var(--color-major-soft); }
    .tag-default { color: var(--color-default); background: var(--color-default-soft); }
    .tag-level2 { color: var(--color-level2); background: var(--color-level2-soft); }
    .tag-level1 { color: var(--color-level1); background: var(--color-level1-soft); }
    .tag-tracking { color: #4f712b; background: var(--color-success-soft); }
    .tag-neutral { color: var(--color-text-soft); background: #f6eee4; }
    .tag-demo { color: #8c6b4e; background: #fff3e5; border-color: #f3dcc4; }
    .tag-fact { color: #4f712b; background: var(--color-success-soft); }

    .chip-row {
      display: flex;
      gap: var(--space-3);
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .chip-row::-webkit-scrollbar { display: none; }
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      min-height: 34px;
      border: 1px solid rgba(243, 227, 209, .95);
      border-radius: var(--radius-pill);
      padding: 0 12px;
      color: var(--color-text-soft);
      background: rgba(255, 252, 247, .88);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }
    .chip.is-active {
      color: var(--color-orange);
      border-color: rgba(255, 106, 0, .26);
      background: var(--color-orange-softer);
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--touch-target);
      gap: var(--space-3);
      align-items: center;
    }
    .search-field {
      display: flex;
      align-items: center;
      min-height: var(--touch-target);
      border: 1px solid rgba(243, 227, 209, .95);
      border-radius: var(--radius-pill);
      padding: 0 14px;
      background: rgba(255, 252, 247, .92);
    }
    .search-field span { color: var(--color-text-muted); margin-right: 8px; }
    .search-field input {
      min-width: 0;
      width: 100%;
      border: 0;
      outline: 0;
      color: var(--color-text);
      background: transparent;
      font-size: 13px;
    }
    .search-field input::placeholder { color: var(--color-text-muted); }

    .customer-hero { min-height: 198px; }
    .hero-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }
    .hero-date {
      color: var(--color-text-muted);
      font-size: 11px;
      line-height: 16px;
      white-space: nowrap;
    }
    .customer-title {
      display: -webkit-box;
      overflow: hidden;
      margin-top: var(--space-4);
      font-size: 20px;
      font-weight: 700;
      line-height: 28px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .customer-group {
      display: -webkit-box;
      overflow: hidden;
      margin-top: var(--space-2);
      color: var(--color-text-soft);
      font-size: 13px;
      line-height: 19px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .hero-facts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-4);
      margin-top: var(--space-6);
    }
    .hero-fact {
      min-width: 0;
      border-radius: var(--radius-md);
      padding: var(--space-5);
      background: rgba(255, 248, 240, .78);
    }
    .hero-fact span {
      display: block;
      color: var(--color-text-muted);
      font-size: 11px;
      line-height: 16px;
    }
    .hero-fact strong {
      display: block;
      overflow: hidden;
      margin-top: var(--space-2);
      font-size: 15px;
      font-weight: 700;
      line-height: 21px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .hero-fact strong.emphasis { color: var(--color-orange); font-size: 20px; line-height: 24px; }

    .fact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-4);
    }
    .fact-item {
      min-width: 0;
      min-height: 92px;
      border: 1px solid rgba(243, 227, 209, .88);
      border-radius: var(--radius-md);
      padding: var(--space-5);
      background: var(--color-surface-muted);
    }
    .fact-item.span-2 { grid-column: 1 / -1; }
    .fact-item span {
      display: block;
      color: var(--color-text-muted);
      font-size: 11px;
      line-height: 16px;
    }
    .fact-item strong {
      display: -webkit-box;
      overflow: hidden;
      margin-top: var(--space-2);
      font-size: 14px;
      font-weight: 700;
      line-height: 21px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .fact-item.span-2 strong { -webkit-line-clamp: 4; }

    .risk-asset-card {
      display: flex;
      min-height: 168px;
      flex-direction: column;
      gap: var(--space-4);
      padding: var(--space-6);
    }
    .asset-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
    }
    .asset-card-head h3 {
      display: -webkit-box;
      overflow: hidden;
      min-width: 0;
      font-size: 15px;
      font-weight: 700;
      line-height: 21px;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }
    .asset-card-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
    }

      return String(value ?? "")

        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    function money(value, unit = "亿元") {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return "—";
      const number = Number(value);
      if (Math.abs(number) >= 10000) return `${(number / 10000).toFixed(2)}万${unit}`;
      const digits = Math.abs(number) < 10 ? 2 : (Number.isInteger(number) ? 0 : 2);
      return `${number.toLocaleString("zh-CN", { minimumFractionDigits: digits, maximumFractionDigits: digits })}${unit}`;
    }

    function parseLocation() {
      let raw = location.hash.slice(1) || "/credit/warning";
      if (!raw.startsWith("/")) raw = "/" + raw;
      const [path, queryString = ""] = raw.split("?");
      return { path, query: new URLSearchParams(queryString), raw };
    }

    function makeHash(path, query = {}) {
      const params = new URLSearchParams();
      Object.entries(query).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== "" && value !== false) params.set(key, String(value));
      });
      return `#${path}${params.toString() ? `?${params.toString()}` : ""}`;
    }

    function navigate(path, query = {}) {
      saveScroll(location.hash.slice(1) || "/credit/warning");
      location.hash = makeHash(path, query);
    }

    function replaceQuery(patch = {}) {
      const current = parseLocation();
      const params = new URLSearchParams(current.query);
      Object.entries(patch).forEach(([key, value]) => {
        if (value === undefined || value === null || value === "" || value === false) params.delete(key);
        else params.set(key, String(value));
      });
      history.replaceState(null, "", `#${current.path}${params.toString() ? `?${params.toString()}` : ""}`);
    }

    function saveScroll(rawKey) {
      if (!rawKey) return;
      UI.scrollPositions[rawKey] = shell.scrollTop || document.documentElement.scrollTop || 0;

    function renderCustomerList(type, query) {
      const isWarning = type === "warning";
      const title = isWarning ? "重大预警客户" : "出险客户";
      const fallback = isWarning ? "/credit/warning/prewarnings/migrations" : "/credit/warning/defaults";
      const totalAmount = isWarning ? DATA.metrics.month.majorWarning.amount : DATA.metrics.month.default.amount;
      const totalCount = isWarning ? DATA.metrics.month.majorWarning.count : DATA.metrics.month.default.count;
      const state = query.get("state") || "ready";
      const q = (query.get("q") || "").toLowerCase();
      const member = query.get("member") || "全部成员公司";
      const sort = query.get("sort") || "amount";
      const items = [...(isWarning ? DATA.warningCustomers : DATA.defaultCustomers)]
        .filter(item => member === "全部成员公司" || item.company === member)
        .filter(item => !q || `${item.name} ${item.group} ${item.company}`.toLowerCase().includes(q))
        .sort((a,b) => sort === "date" ? b.date.localeCompare(a.date) : b.amount - a.amount);

      let listContent = "";
      if (state === "loading") {
        listContent = `<div class="risk-list"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>`;
      } else if (state === "error") {
        listContent = `<section class="card error-state"><span class="state-icon">!</span><h3>列表加载失败</h3><p>请检查当前网络后重试。本状态用于验证错误处理。</p><button class="button button-primary" type="button" data-action="retry-list">重新加载</button></section>`;
      } else if (!items.length || state === "empty") {
        listContent = `<section class="card empty-state"><span class="state-icon">⌕</span><h3>没有匹配的${title}</h3><p>可调整搜索词或重置筛选条件。</p><button class="button button-secondary" type="button" data-action="reset-list-filters">重置筛选</button></section>`;
      } else {
        listContent = `<div class="risk-list" id="risk-list">${items.map(item => riskListItem(item, type)).join("")}</div><div class="data-scope-row"><span>当前演示展示 ${items.length} 户</span><span>汇总口径 ${totalCount} 户</span></div>`;
      }

      return `
        <div class="page">
          ${pageHeader(title, fallback)}
          <div class="page-content">
            <section class="hero-card">
              <div class="hero-facts" style="margin-top:0">
                <div class="hero-fact"><span>${isWarning ? "重大预警规模" : "出险规模"}</span><strong class="emphasis">${totalAmount.toFixed(2)}亿元</strong></div>
                <div class="hero-fact"><span>法人客户</span><strong>${totalCount}户</strong></div>

            </section>

            <section class="search-row">
              <label class="search-field"><span aria-hidden="true">⌕</span><input id="list-search" type="search" value="${escapeHtml(query.get("q") || "")}" placeholder="搜索法人客户或所属集团" aria-label="搜索法人客户或所属集团"></label>
              <button class="icon-button icon-small" type="button" data-open-sheet="filter" aria-label="筛选">≡</button>
            </section>

            <div class="chip-row">
              <button class="chip is-active" type="button" data-open-sheet="filter">${isWarning ? "本月新增" : "本月"}</button>
              <button class="chip ${member !== "全部成员公司" ? "is-active" : ""}" type="button" data-open-sheet="filter">${escapeHtml(member)}</button>
              ${isWarning ? "" : `<button class="chip ${query.get("category") ? "is-active" : ""}" type="button" data-open-sheet="filter">${escapeHtml(query.get("category") || "全部类别")}</button>`}

    function getTrackingState() {
      try {
        const stored = JSON.parse(safeStorage.get("localStorage", "wd-tracking", "null") || "null");
        return stored ? { ...DATA.tracking, ...stored } : DATA.tracking;
      } catch { return DATA.tracking; }
    }

    function renderRoute() {
      const current = parseLocation();
      if (current.path === "/" || current.path === "/credit") {
        location.replace(makeHash("/credit/warning"));
        return;
      }
      let html = "";
      if (current.path === "/credit/warning") html = renderOverview(current.query);
      else if (current.path === "/credit/warning/prewarnings") html = renderPrewarnings(current.query);
      else if (current.path === "/credit/warning/prewarnings/migrations") html = renderMigrations(current.query);
      else if (current.path === "/credit/warning/prewarnings/customers") html = renderCustomerList("warning", current.query);
      else if (current.path === "/credit/warning/defaults") html = renderDefaults(current.query);
      else if (current.path === "/credit/warning/defaults/customers") html = renderCustomerList("default", current.query);
      else if (current.path === "/credit/warning/customers/changning-shangyu") html = renderWarningCustomer();
      else if (current.path === "/credit/warning/customers/guangxi-baise") html = renderDefaultCustomer();
      else if (current.path.startsWith("/credit/warning/assets/")) {
        const assetId = current.path.split("/").pop();
        const asset = DATA.assets[assetId];
        html = asset ? (asset.state === "major" ? renderWarningAsset(asset) : renderDefaultAsset(asset)) : renderNotFound();
      } else if (current.path === "/watch/tracking/guangxi-baise-default") html = renderTracking();
      else html = renderNotFound();

      app.innerHTML = html;
      renderOverlay(current);
      restoreScroll(current.raw);
      updateListSearchVisibility();
      updateTrackingSubmitState();
      trapFocusIfNeeded();
    }

    function renderNotFound() {
      return `<div class="page no-ask">${pageHeader("页面未找到", "/credit/warning")}<div class="page-content"><section class="card empty-state"><span class="state-icon">?</span><h3>未找到该原型页面</h3><p>请返回预警出险总览继续浏览。</p><button class="button button-primary" type="button" data-nav="/credit/warning">返回总览</button></section></div></div>`;
    }

    function renderOverlay(current) {
      document.querySelectorAll(".overlay").forEach(node => node.remove());
      const sheet = current.query.get("sheet");
      const copilot = current.query.get("copilot");
      if (copilot) document.body.insertAdjacentHTML("beforeend", renderCopilot(current));
      else if (sheet) document.body.insertAdjacentHTML("beforeend", renderSheet(sheet, current));
      document.body.style.overflow = sheet || copilot ? "hidden" : "";
    }

    function renderSheet(sheet, current) {
      if (sheet === "filter") return renderFilterSheet(current);
      if (sheet === "tracking") return renderTrackingSheet(current);
      if (sheet === "report") return renderReportSheet(current);
      if (sheet === "metrics") return renderMetricsSheet();
      if (sheet === "member") return renderMemberSheet(current);
      if (sheet === "progress") return renderProgressSheet();
      return "";

    function updateTrackingSubmitState() {
      const button = document.getElementById("tracking-submit");

    function updateListSearchVisibility() {
      const input = document.getElementById("list-search");
      if (!input) return;
      const value = input.value.trim().toLowerCase();
      const items = [...document.querySelectorAll("[data-list-item]")];
      items.forEach(item => item.classList.toggle("is-hidden", value && !item.dataset.search.includes(value)));
    }

    function closeOverlay() {
      const current = parseLocation();
      const params = new URLSearchParams(current.query);
      params.delete("sheet");
      params.delete("copilot");
      params.delete("asset");
      UI.sheetDraft = null;
      history.replaceState(null, "", `#${current.path}${params.toString() ? `?${params.toString()}` : ""}`);
      document.querySelectorAll(".overlay").forEach(node => node.remove());
      document.body.style.overflow = "";
      const trigger = document.querySelector("[data-overlay-trigger='last']");
      if (trigger) trigger.focus();
    }

    function openOverlay(kind, assetId = "") {
      document.querySelectorAll("[data-overlay-trigger='last']").forEach(node => node.removeAttribute("data-overlay-trigger"));
      if (document.activeElement instanceof HTMLElement) document.activeElement.dataset.overlayTrigger = "last";
      const current = parseLocation();
      const params = new URLSearchParams(current.query);
      if (kind === "copilot") params.set("copilot", "1");
      else params.set("sheet", kind);
      if (assetId) params.set("asset", assetId);
      history.pushState(null, "", `#${current.path}?${params.toString()}`);
      renderRoute();
    }

    function trapFocusIfNeeded() {
      const dialog = document.querySelector('[role="dialog"]');
      if (!dialog) return;
      const focusables = [...dialog.querySelectorAll('button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex="0"]')];
      (focusables[0] || dialog).focus?.();
      dialog.addEventListener("keydown", event => {
        if (event.key === "Escape") { event.preventDefault(); closeOverlay(); return; }
        if (event.key !== "Tab" || focusables.length < 2) return;
        const first = focusables[0];
        const last = focusables[focusables.length - 1];
        if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); }
        else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); }
      }, { once: false });
    }

    document.addEventListener("click", event => {
      const target = event.target.closest("button, [data-nav], [data-list-item]");
      if (!target) return;

      if (target.matches("[data-back]")) {
        saveScroll(parseLocation().raw);
        if (history.length > 1) history.back();
        else navigate(target.dataset.fallback || "/credit/warning");
        return;
      }
      if (target.matches("[data-share]")) { shareCurrent(); return; }
      if (target.matches("[data-close-overlay]")) { closeOverlay(); return; }
      if (target.matches("[data-open-copilot]")) { openOverlay("copilot"); return; }
      if (target.matches("[data-open-sheet]")) { openOverlay(target.dataset.openSheet); return; }
      if (target.matches("[data-open-tracking]")) { openOverlay("tracking", target.dataset.assetId); return; }
      if (target.matches("[data-open-report]")) { openOverlay("report", target.dataset.assetId); return; }
      if (target.matches("[data-period]")) {
        replaceQuery({ period: target.dataset.period });
        renderRoute();
        return;
      }
      if (target.matches("[data-set-member]")) {
        const current = parseLocation();
        const params = new URLSearchParams(current.query);
        params.set("member", target.dataset.setMember);
        params.delete("sheet");
        history.replaceState(null, "", `#${current.path}?${params.toString()}`);
        UI.sheetDraft = null;
        renderRoute();
        return;
      }
      if (target.matches("[data-select-member-sheet]")) {
        const current = parseLocation();
        const params = new URLSearchParams(current.query);
        params.set("member", target.dataset.selectMemberSheet);
        params.delete("sheet");
        history.replaceState(null, "", `#${current.path}?${params.toString()}`);
        renderRoute();
        return;
      }
      if (target.matches("[data-draft-key]")) {
        UI.sheetDraft[target.dataset.draftKey] = target.dataset.draftValue;
        renderRoute();
        return;
      }
      if (target.matches("[data-report-key]")) {
        const key = target.dataset.reportKey;
        UI.reportDraft[key] = !UI.reportDraft[key];
        renderRoute();
        return;
      }
      if (target.matches("[data-nav]")) {
        const path = target.dataset.nav;
        const query = {};
        if (target.dataset.queryGrade) query.grade = target.dataset.queryGrade;
        navigate(path, query);
        return;
      }

      const action = target.dataset.action;
      if (!action) return;
      if (action === "non-scope-tab") showToast("本交互原型仅覆盖“预警与出险”模块");
      else if (action === "open-prewarnings") navigate("/credit/warning/prewarnings");
      else if (action === "open-migration") navigate("/credit/warning/prewarnings/migrations");
      else if (action === "open-warning-customers") navigate("/credit/warning/prewarnings/customers");
      else if (action === "open-default-customers") navigate("/credit/warning/defaults/customers");
      else if (action === "open-metrics") openOverlay("metrics");
      else if (action === "open-member-sheet") openOverlay("member");
      else if (action === "show-all-history") showToast("已展示当前提供的全部状态记录");
      else if (action === "scroll-full-fields") document.getElementById("full-fields")?.scrollIntoView({ behavior: "smooth", block: "start" });
      else if (action === "reset-filter-draft") {
        const current = parseLocation();
        initFilterDraft({ ...current, query: new URLSearchParams() });
        renderRoute();
      }
      else if (action === "apply-filter-draft") {
        const current = parseLocation();
        const params = new URLSearchParams(current.query);
        params.delete("sheet");
        params.set("member", UI.sheetDraft.member);
        params.set("time", UI.sheetDraft.time);
        params.set("sort", UI.sheetDraft.sort);
        if (!current.path.includes("prewarnings")) params.set("category", UI.sheetDraft.category);
        history.replaceState(null, "", `#${current.path}?${params.toString()}`);
        UI.sheetDraft = null;
        renderRoute();
        showToast("筛选条件已应用");
      }
      else if (action === "reset-list-filters") {
        const current = parseLocation();
        history.replaceState(null, "", `#${current.path}`);
        renderRoute();
      }
      else if (action === "retry-list") {
        replaceQuery({ state: null });
        renderRoute();
        showToast("列表已重新加载");
      }
      else if (action === "submit-tracking") submitTracking(target.dataset.assetId);
      else if (action === "submit-progress") submitProgress();
      else if (action === "submit-report") submitReport();
    });

    document.addEventListener("change", event => {
      const target = event.target;
      if (target.id === "tracking-owner") { UI.trackingDraft.owner = target.value; updateTrackingSubmitState(); }
      if (target.id === "tracking-date") { UI.trackingDraft.dueDate = target.value; updateTrackingSubmitState(); }
      if (target.id === "tracking-frequency") { UI.trackingDraft.frequency = target.value; }
      if (target.id === "migration-sort") { replaceQuery({ sort: target.value }); renderRoute(); }
      if (target.id === "migration-member") { replaceQuery({ member: target.value }); renderRoute(); }
    });

    document.addEventListener("input", event => {
      const target = event.target;
      if (target.id === "list-search") {
        replaceQuery({ q: target.value || null });
        updateListSearchVisibility();
      }
      if (target.id === "progress-input") UI.progressDraft = target.value;
    });

    document.addEventListener("submit", event => {
      if (event.target.id !== "copilot-form") return;
      event.preventDefault();
      const input = document.getElementById("copilot-question");
      const value = input.value.trim();
      if (!value) return;
      UI.copilotQuestion = value;
      renderRoute();
    });

    function submitTracking(assetId) {
      if (!(UI.trackingDraft.owner && UI.trackingDraft.dueDate)) return;
      const asset = DATA.assets[assetId] || DATA.assets["guangxi-baise-047"];
      const frequencyMap = { weekly: "每周", daily: "每日", monthly: "每月" };
      const stored = {
        subject: asset.name,
        assetId: asset.id,
        company: asset.company,
        ownerDepartment: UI.trackingDraft.owner === "李明" ? "租赁风险管理部" : "集团风险管理部",
        ownerName: UI.trackingDraft.owner,
        dueDate: UI.trackingDraft.dueDate,
        frequency: frequencyMap[UI.trackingDraft.frequency],
        latestUpdateAt: DATA.tracking.latestUpdateAt
      };
      safeStorage.set("localStorage", "wd-tracking", JSON.stringify(stored));
      UI.trackingDraft = { owner: "", dueDate: "", frequency: "weekly" };
      closeOverlay();
      if (asset.state === "default") {
        navigate("/watch/tracking/guangxi-baise-default");
        setTimeout(() => showToast("已加入重点跟踪"), 80);
      } else {
        showToast("已加入重点跟踪");
      }
    }

    function submitProgress() {
      const value = UI.progressDraft.trim();
      if (!value) { showToast("请填写跟踪进展", "error"); return; }
      const stored = getTrackingState();
      const next = {
        ...stored,
        progressTitle: "最新跟踪进展",
        progressText: value,
        latestUpdateAt: DATA.asOfDate,
        records: [
          { date: "06-24", title: "更新进展", description: value },
          ...stored.records
        ]
      };
      safeStorage.set("localStorage", "wd-tracking", JSON.stringify(next));
      UI.progressDraft = "";
      closeOverlay();
      renderRoute();
      showToast("跟踪进展已更新");
    }

    function submitReport() {
      if (!Object.values(UI.reportDraft).some(Boolean)) { showToast("请至少选择一项报告内容", "error"); return; }
      closeOverlay();
      showToast("报告内容已准备");
    }

    window.addEventListener("hashchange", event => {
      const oldHash = new URL(event.oldURL).hash.slice(1);
      saveScroll(oldHash);
      UI.sheetDraft = null;
      renderRoute();
    });

    window.addEventListener("popstate", () => {
      UI.sheetDraft = null;
      renderRoute();
    });

    if (!location.hash) location.hash = "#/credit/warning";
    else renderRoute();
  </script>
</body>
</html>
